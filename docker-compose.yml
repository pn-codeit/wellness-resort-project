services:
  frontend-web:
    build: ./frontend-web
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      PORT: 8080
      BOOKING_SERVICE_URL: http://booking-service:3000
      SHOP_SERVICE_URL: http://shop-service:3000
      IMPRESSIONS_SERVICE_URL: http://impressions-service:3000
      ASSISTANT_SERVICE_URL: http://assistant-service:3000
      SERVICE_TIMEOUT_MS: 1500
    depends_on:
      booking-service:
        condition: service_started
      shop-service:
        condition: service_started
      impressions-service:
        condition: service_started
      assistant-service:
        condition: service_started

  booking-service:
    build: ./services/booking-service
    environment:
      SERVICE_NAME: booking-service
      PORT: 3000
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  shop-service:
    build: ./services/shop-service
    environment:
      SERVICE_NAME: shop-service
      PORT: 3000
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  impressions-service:
    build: ./services/impressions-service
    environment:
      SERVICE_NAME: impressions-service
      PORT: 3000
      MYSQL_HOST: mysql
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

  weather-service:
    build: ./services/weather-service
    environment:
      SERVICE_NAME: weather-service
      PORT: 3000

  assistant-service:
    build: ./services/assistant-service
    environment:
      SERVICE_NAME: assistant-service
      PORT: 3000
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wellness_resort}
      MYSQL_USER: ${MYSQL_USER:-wellness}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wellness}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wellness_root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  redis-data:
  minio-data:
